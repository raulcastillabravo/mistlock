name: Run Tests

on:
  push:
    branches: [ main, feature/** ]
    paths-ignore:
      - 'docs/**'
  schedule:
    - cron: '0 0 * * *'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-tests:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Install Project Dependencies
        run: uv sync

      - name: Install Dev Containers CLI
        run: |
          chmod +x ./scripts/setup-tests.sh
          ./scripts/setup-tests.sh

      - name: Run MVE Tests
        run: uv run pytest -v -s tests/
        env:
          PYTHONPATH: .

  release:
    name: Release
    needs: run-tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Run Semantic Release
        run: npx semantic-release@25
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
