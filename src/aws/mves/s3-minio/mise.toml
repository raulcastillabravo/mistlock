[tools]
python = "3.12"
uv = "latest"
awscli = "latest"

[settings]
env_file = ".env"

[tasks.sync]
description = "Sync python dependencies"
run = "uv sync"

[tasks.configure_aws]
description = "Configure AWS CLI"
run = """
aws configure set aws_access_key_id $S3_ACCESS_KEY --profile minio
aws configure set aws_secret_access_key $S3_SECRET_KEY --profile minio
aws configure set region $AWS_DEFAULT_REGION --profile minio
aws configure set profile.minio.endpoint_url $S3_ENDPOINT
"""

[tasks.create_buckets]
description = "Create MinIO buckets"
run = """
aws s3 mb s3://$S3_BUCKET_BRONZE --profile minio 2>/dev/null || true
aws s3 mb s3://$S3_BUCKET_SILVER --profile minio 2>/dev/null || true
"""

[tasks.setup]
description = "Full environment setup"
run = [
  { task = "sync" },
  { task = "configure_aws" },
  { task = "create_buckets" },
]
