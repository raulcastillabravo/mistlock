[tools]
python = "3.12"
uv = "latest"
dapr-cli = "latest"

[env]
DAPR_HTTP_PORT = "3500"
AZURE_STORAGE_CONNECTION_STRING = "DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://localhost:10000/devstoreaccount1;"
SQL_CONNECTION_STRING = "Server=localhost,1433;Database=master;User Id=sa;Password=Password123!;Encrypt=False;TrustServerCertificate=True;"

[tasks.setup]
description = "Sync python dependencies"
run = "uv sync"

[tasks.init-storage]
description = "Create azurite container"
run = "docker exec azurite_local azurite-blob --blobHost 0.0.0.0 & sleep 5 && curl -X PUT -H 'x-ms-blob-type: BlockBlob' http://localhost:10000/devstoreaccount1/inbound?restype=container"

[tasks.init-sql]
description = "Initialize SQL tables"
run = "docker exec -i sql_local /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P Password123! -d master < sql/init.sql"
