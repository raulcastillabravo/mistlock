services:
  redis:
    image: redis:8-alpine
    container_name: redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data

  dev:
    image: mcr.microsoft.com/devcontainers/python:3.12-bookworm
    container_name: dev
    network_mode: host
    depends_on:
      - redis
    volumes:
      - .:/app:cached
    working_dir: /app
    command: sleep infinity

volumes:
  redis_data: